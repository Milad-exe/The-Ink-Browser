<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruno - API Client</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bruno-container">
    <!-- Left Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2 id="collection-title">Collections</h2>
        <button id="new-request-btn" class="btn-icon">+</button>
      </div>
      <div id="requests-list" class="collections-list">
        <div class="empty-state">No collection open</div>
      </div>
    </div>

    <!-- Main Area -->
    <div class="main-area">
      <div style="display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);">
        <button id="open-collection-btn" class="btn-small">Open Collection</button>
        <button id="bruno-close-btn" class="btn-icon">✕</button>
      </div>

      <div class="request-builder">
        <div class="rb-row">
          <select id="request-method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
          </select>
          <input type="text" id="request-url" placeholder="https://api.example.com">
          <button id="send-btn" class="btn-send">Send</button>
        </div>
      </div>

      <div class="request-tabs">
        <button class="req-tab active" data-tab="body">Body</button>
        <button class="req-tab" data-tab="params">Params</button>
        <button class="req-tab" data-tab="headers">Headers</button>
        <button class="req-tab" data-tab="auth">Auth</button>
        <button class="req-tab" data-tab="script">Script</button>
        <button class="req-tab" data-tab="assert">Assert</button>
        <button class="req-tab" data-tab="docs">Docs</button>
      </div>

      <div class="content-and-response">
        <div class="tab-content-area">
          <div class="tab-pane active" id="body-pane"><textarea id="body-textarea"></textarea></div>
          <div class="tab-pane" id="params-pane"><textarea id="params-textarea"></textarea></div>
          <div class="tab-pane" id="headers-pane"><textarea id="headers-textarea"></textarea></div>
          <div class="tab-pane" id="auth-pane"><div style="padding: 16px;"><select id="auth-type"><option>None</option><option>Basic</option><option>Bearer</option></select></div></div>
          <div class="tab-pane" id="script-pane"><textarea id="script-textarea"></textarea></div>
          <div class="tab-pane" id="assert-pane"><textarea id="assert-textarea"></textarea></div>
          <div class="tab-pane" id="docs-pane"><textarea id="docs-textarea"></textarea></div>
        </div>

        <div class="response-panel">
          <div class="response-header">Response</div>
          <div class="response-status" id="response-status">Ready</div>
          <pre id="response-body" class="response-body">Ready to send</pre>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-new-request" class="modal hidden">
    <div class="modal-content">
      <h3>New Request</h3>
      <input type="text" id="request-name-input" class="modal-input" placeholder="Request name">
      <div style="margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end;">
        <button id="modal-cancel" class="btn-modal-cancel">Cancel</button>
        <button id="modal-create" class="btn-modal-primary">Create</button>
      </div>
    </div>
  </div>

  <script>
// ============================================================================
// BRUNO STATE
// ============================================================================
const bruno = {
  collectionPath: null,
  collectionName: null,
  requests: {},
  currentRequestFile: null,

  isOpen() {
    return !!this.collectionPath;
  }
};

console.log('✅ Bruno inline script loaded');

// ============================================================================
// MODAL FUNCTIONS
// ============================================================================
function showModal(id) {
  document.getElementById(id).classList.remove('hidden');
  const input = document.getElementById('request-name-input');
  if (input) input.focus();
}

function closeModals() {
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
}

// ============================================================================
// COLLECTION MANAGEMENT
// ============================================================================
async function openCollection() {
  try {
    const path = await window.bruno.selectDirectory();
    if (!path) return;

    bruno.collectionPath = path;
    bruno.collectionName = path.split(/[\/\\]/).pop();
    bruno.requests = {};
    bruno.currentRequestFile = null;

    updateCollectionUI();
  } catch (error) {
    console.error('Error opening collection:', error);
    alert('Error: ' + error.message);
  }
}

function updateCollectionUI() {
  document.getElementById('collection-title').textContent = bruno.collectionName || 'Collections';
  renderRequests();
}

// ============================================================================
// REQUEST MANAGEMENT
// ============================================================================
async function createRequest() {
  if (!bruno.isOpen()) {
    alert('Please open a collection first');
    return;
  }

  const name = document.getElementById('request-name-input').value.trim();
  if (!name) {
    alert('Enter request name');
    return;
  }

  try {
    const filename = `${Date.now()}_${name.replace(/\s+/g, '_')}`;
    const requestData = {
      filename,
      name,
      method: 'GET',
      url: '',
      body: '',
      auth: { type: 'none' },
      script: '',
      assert: '',
      docs: ''
    };

    const filepath = `${bruno.collectionPath}/${filename}.json`;
    await window.bruno.saveCollectionFile(filepath, JSON.stringify(requestData, null, 2));

    bruno.requests[filename] = requestData;
    bruno.currentRequestFile = filename;

    document.getElementById('request-name-input').value = '';
    closeModals();
    renderRequests();
    loadRequest(requestData);
  } catch (error) {
    console.error('Error creating request:', error);
    alert('Error: ' + error.message);
  }
}

function openRequest(filename) {
  const request = bruno.requests[filename];
  if (!request) return;
  bruno.currentRequestFile = filename;
  renderRequests();
  loadRequest(request);
}

function deleteRequest(filename) {
  if (!confirm('Delete request?')) return;
  delete bruno.requests[filename];
  if (bruno.currentRequestFile === filename) {
    bruno.currentRequestFile = null;
    clearRequestUI();
  }
  renderRequests();
}

function loadRequest(req) {
  document.getElementById('request-method').value = req.method || 'GET';
  document.getElementById('request-url').value = req.url || '';
  document.getElementById('body-textarea').value = req.body || '';
  document.getElementById('script-textarea').value = req.script || '';
  document.getElementById('assert-textarea').value = req.assert || '';
  document.getElementById('docs-textarea').value = req.docs || '';
  document.getElementById('auth-type').value = req.auth?.type || 'none';
}

function clearRequestUI() {
  document.getElementById('request-url').value = '';
  document.getElementById('body-textarea').value = '';
  document.getElementById('script-textarea').value = '';
  document.getElementById('assert-textarea').value = '';
  document.getElementById('docs-textarea').value = '';
}

async function saveCurrentRequest() {
  if (!bruno.currentRequestFile || !bruno.isOpen()) return;
  const req = bruno.requests[bruno.currentRequestFile];
  if (!req) return;

  req.method = document.getElementById('request-method').value;
  req.url = document.getElementById('request-url').value;
  req.body = document.getElementById('body-textarea').value;
  req.script = document.getElementById('script-textarea').value;
  req.assert = document.getElementById('assert-textarea').value;
  req.docs = document.getElementById('docs-textarea').value;
  req.auth = { type: document.getElementById('auth-type').value };

  const filepath = `${bruno.collectionPath}/${bruno.currentRequestFile}.json`;
  await window.bruno.saveCollectionFile(filepath, JSON.stringify(req, null, 2));
}

// ============================================================================
// UI RENDERING
// ============================================================================
function renderRequests() {
  const list = document.getElementById('requests-list');
  if (!bruno.isOpen()) {
    list.innerHTML = '<div class="empty-state">No collection open</div>';
    return;
  }

  const requests = Object.values(bruno.requests);
  if (requests.length === 0) {
    list.innerHTML = '<div class="empty-state">No requests</div>';
    return;
  }

  list.innerHTML = '';
  requests.forEach(req => {
    const el = document.createElement('div');
    el.className = 'req-item' + (bruno.currentRequestFile === req.filename ? ' active' : '');
    el.style.display = 'flex';
    el.style.justifyContent = 'space-between';
    el.style.alignItems = 'center';

    const nameSpan = document.createElement('span');
    nameSpan.style.flex = '1';
    nameSpan.style.cursor = 'pointer';
    nameSpan.innerHTML = `<span style="color: var(--accent); font-weight: 500; font-size: 11px;">${req.method}</span> ${req.name}`;
    nameSpan.addEventListener('click', () => openRequest(req.filename));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-icon';
    delBtn.style.width = '18px';
    delBtn.style.height = '18px';
    delBtn.style.fontSize = '12px';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteRequest(req.filename);
    });

    el.appendChild(nameSpan);
    el.appendChild(delBtn);
    list.appendChild(el);
  });
}

// ============================================================================
// EVENT LISTENERS
// ============================================================================
document.getElementById('open-collection-btn').addEventListener('click', openCollection);

document.getElementById('new-request-btn').addEventListener('click', () => {
  if (!bruno.isOpen()) {
    alert('Please open a collection first');
    return;
  }
  showModal('modal-new-request');
});

document.getElementById('modal-cancel').addEventListener('click', closeModals);
document.getElementById('modal-create').addEventListener('click', createRequest);

document.getElementById('bruno-close-btn').addEventListener('click', () => {
  window.bruno.close();
});

document.querySelectorAll('.req-tab').forEach(tab => {
  tab.addEventListener('click', (e) => {
    saveCurrentRequest();
    document.querySelectorAll('.req-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    const tabName = e.target.getAttribute('data-tab');
    document.getElementById(`${tabName}-pane`).classList.add('active');
  });
});

document.getElementById('send-btn').addEventListener('click', async () => {
  saveCurrentRequest();

  const method = document.getElementById('request-method').value;
  let url = document.getElementById('request-url').value;
  const body = document.getElementById('body-textarea').value;

  if (!url) {
    alert('Please enter URL');
    return;
  }

  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }

  try {
    const options = { method, headers: {} };

    if (body && method !== 'GET' && method !== 'HEAD') {
      options.body = body;
      options.headers['Content-Type'] = 'application/json';
    }

    document.getElementById('response-status').textContent = 'Loading...';
    document.getElementById('response-body').textContent = 'Sending request...';

    const response = await fetch(url, options);
    const responseBody = await response.text();

    document.getElementById('response-status').textContent = `${response.status} ${response.statusText}`;
    document.getElementById('response-body').textContent = responseBody || '(empty response)';
  } catch (error) {
    document.getElementById('response-body').textContent = 'Error: ' + error.message;
    document.getElementById('response-status').textContent = 'Error';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    window.bruno.close();
  }
});

console.log('✅ Bruno initialized - all event listeners attached');
  </script>
</body>
</html>
